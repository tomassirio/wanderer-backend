<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password – Wanderer</title>
    <style>
        body, table, td, a { -webkit-text-size-adjust: 100%; -ms-text-size-adjust: 100%; }
        body { margin: 0; padding: 0; width: 100% !important; height: 100% !important; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: #FAF9F7;
            color: #1A1A1A;
            line-height: 1.6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .page-wrapper {
            width: 100%;
            background-color: #FAF9F7;
            padding: 40px 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .card-container {
            width: 100%;
            max-width: 520px;
            margin: 0 auto;
            background-color: #FFFFFF;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08), 0 16px 48px rgba(0, 0, 0, 0.04);
        }
        .card-header {
            background: linear-gradient(135deg, #E07830 0%, #F5A623 100%);
            padding: 48px 40px 40px;
            text-align: center;
        }
        .card-header .logo-circle {
            display: inline-block;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            line-height: 80px;
            margin-bottom: 20px;
        }
        .card-header .logo-circle img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            vertical-align: middle;
        }
        .card-header h1 {
            margin: 0 0 4px;
            font-size: 28px;
            font-weight: 700;
            color: #FFFFFF;
            letter-spacing: -0.3px;
        }
        .card-header p {
            margin: 0;
            font-size: 15px;
            color: rgba(255, 255, 255, 0.85);
        }
        .card-body {
            padding: 40px;
        }
        .card-body h2 {
            margin: 0 0 8px;
            font-size: 22px;
            font-weight: 700;
            color: #1A1A1A;
            text-align: center;
        }
        .card-body .subtitle {
            margin: 0 0 28px;
            font-size: 15px;
            color: #666666;
            line-height: 1.7;
            text-align: center;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #1A1A1A;
            margin-bottom: 6px;
        }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            font-size: 15px;
            font-family: inherit;
            color: #1A1A1A;
            background-color: #FAF9F7;
            border: 1px solid #E8E6E3;
            border-radius: 8px;
            outline: none;
            transition: border-color 0.2s;
            box-sizing: border-box;
        }
        .form-group input:focus {
            border-color: #E07830;
            box-shadow: 0 0 0 3px rgba(224, 120, 48, 0.15);
        }
        .submit-button {
            display: block;
            width: 100%;
            padding: 14px 36px;
            background: linear-gradient(135deg, #E07830 0%, #D35400 100%);
            color: #FFFFFF;
            font-size: 16px;
            font-weight: 600;
            font-family: inherit;
            border: none;
            border-radius: 8px;
            letter-spacing: 0.2px;
            box-shadow: 0 4px 12px rgba(224, 120, 48, 0.35);
            cursor: pointer;
            transition: box-shadow 0.2s, opacity 0.2s;
            margin-top: 8px;
        }
        .submit-button:hover {
            box-shadow: 0 6px 16px rgba(224, 120, 48, 0.45);
        }
        .submit-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .error-message {
            display: none;
            background-color: #FFF0F0;
            border-left: 3px solid #f44336;
            border-radius: 0 8px 8px 0;
            padding: 12px 16px;
            margin-bottom: 20px;
            font-size: 13px;
            color: #c62828;
        }
        .success-message {
            display: none;
            text-align: center;
        }
        .success-message .status-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: linear-gradient(135deg, #4CAF50 0%, #66BB6A 100%);
            margin-bottom: 24px;
            box-shadow: 0 4px 12px rgba(76, 175, 80, 0.35);
        }
        .success-message .status-icon span {
            font-size: 36px;
            color: #FFFFFF;
            line-height: 1;
        }
        .success-message h2 {
            margin: 0 0 12px;
            font-size: 22px;
            font-weight: 700;
            color: #1A1A1A;
        }
        .success-message p {
            margin: 0 0 16px;
            font-size: 15px;
            color: #666666;
            line-height: 1.7;
        }
        .redirect-text {
            font-size: 13px;
            color: #999999;
        }
        .redirect-text a {
            color: #E07830;
            text-decoration: none;
            font-weight: 600;
        }
        .redirect-text a:hover {
            text-decoration: underline;
        }
        .password-requirements {
            font-size: 12px;
            color: #999999;
            margin-top: 4px;
        }
        .card-footer {
            background-color: #FAF9F7;
            padding: 28px 40px;
            text-align: center;
            border-top: 1px solid #F0EFED;
        }
        .card-footer p {
            margin: 0 0 6px;
            font-size: 12px;
            color: #999999;
            line-height: 1.6;
        }
        .card-footer .brand {
            font-weight: 600;
            color: #E07830;
        }
        @media only screen and (max-width: 600px) {
            .page-wrapper { padding: 16px 0 !important; }
            .card-container { margin: 0 12px !important; border-radius: 12px !important; }
            .card-header { padding: 36px 24px 32px !important; }
            .card-body { padding: 28px 24px !important; }
            .card-footer { padding: 24px !important; }
            .card-header h1 { font-size: 24px !important; }
        }
    </style>
</head>
<body>
    <div class="page-wrapper">
        <div class="card-container">

            <!-- HEADER -->
            <div class="card-header">
                <div class="logo-circle">
                    <img src="{{logoSrc}}" alt="Wanderer" width="80" height="80">
                </div>
                <h1>Wanderer</h1>
                <p>Track your trips &amp; adventures</p>
            </div>

            <!-- BODY -->
            <div class="card-body">

                <!-- FORM VIEW -->
                <div id="formView">
                    <h2>Reset your password</h2>
                    <p class="subtitle">Enter your new password below.</p>

                    <div id="errorBox" class="error-message"></div>

                    <form id="resetForm" onsubmit="return handleSubmit(event)">
                        <input type="hidden" id="token" value="{{token}}">

                        <div class="form-group">
                            <label for="newPassword">New Password</label>
                            <input type="password" id="newPassword" name="newPassword" placeholder="Enter new password" required minlength="8">
                            <p class="password-requirements">Must be at least 8 characters long</p>
                        </div>

                        <div class="form-group">
                            <label for="confirmPassword">Confirm Password</label>
                            <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm new password" required minlength="8">
                        </div>

                        <button type="submit" id="submitBtn" class="submit-button">
                            &#128274;&nbsp;&nbsp;Reset Password
                        </button>
                    </form>
                </div>

                <!-- SUCCESS VIEW -->
                <div id="successView" class="success-message">
                    <div class="status-icon">
                        <span>&#10003;</span>
                    </div>
                    <h2>Password Reset!</h2>
                    <p>Your password has been reset successfully. You can now log in with your new password.</p>
                    <p class="redirect-text">Redirecting to login in <span id="countdown">5</span> seconds&hellip; or <a id="loginLink" href="{{loginUrl}}">click here</a></p>
                </div>

            </div>

            <!-- FOOTER -->
            <div class="card-footer">
                <p><span class="brand">Wanderer</span></p>
            </div>

        </div>
    </div>

    <script>
        function handleSubmit(event) {
            event.preventDefault();

            var newPassword = document.getElementById('newPassword').value;
            var confirmPassword = document.getElementById('confirmPassword').value;
            var token = document.getElementById('token').value;
            var errorBox = document.getElementById('errorBox');
            var submitBtn = document.getElementById('submitBtn');

            // Hide previous error
            errorBox.style.display = 'none';

            // Validate passwords match
            if (newPassword !== confirmPassword) {
                errorBox.textContent = 'Passwords do not match.';
                errorBox.style.display = 'block';
                return false;
            }

            if (newPassword.length < 8) {
                errorBox.textContent = 'Password must be at least 8 characters long.';
                errorBox.style.display = 'block';
                return false;
            }

            // Disable button
            submitBtn.disabled = true;
            submitBtn.textContent = 'Resetting...';

            // Send PUT request
            var xhr = new XMLHttpRequest();
            xhr.open('PUT', '{{resetApiUrl}}', true);
            xhr.setRequestHeader('Content-Type', 'application/json');
            xhr.onload = function() {
                if (xhr.status === 200) {
                    var response;
                    try { response = JSON.parse(xhr.responseText); } catch(e) { response = {}; }

                    // Build login URL with username for autocomplete
                    var loginUrl = '{{loginUrl}}';
                    if (response.username) {
                        loginUrl += '?username=' + encodeURIComponent(response.username);
                    }

                    // Show success view
                    document.getElementById('formView').style.display = 'none';
                    var successView = document.getElementById('successView');
                    successView.style.display = 'block';

                    // Update the "click here" link with the username-populated URL
                    var loginLink = document.getElementById('loginLink');
                    if (loginLink) loginLink.href = loginUrl;

                    // Start countdown redirect
                    var seconds = 5;
                    var countdownEl = document.getElementById('countdown');
                    var interval = setInterval(function() {
                        seconds--;
                        if (countdownEl) countdownEl.textContent = seconds;
                        if (seconds <= 0) {
                            clearInterval(interval);
                            window.location.href = loginUrl;
                        }
                    }, 1000);
                } else {
                    var response;
                    try { response = JSON.parse(xhr.responseText); } catch(e) { response = null; }
                    var msg = (response && response.message) ? response.message : 'Failed to reset password. The link may have expired.';
                    errorBox.textContent = msg;
                    errorBox.style.display = 'block';
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = '&#128274;&nbsp;&nbsp;Reset Password';
                }
            };
            xhr.onerror = function() {
                errorBox.textContent = 'Network error. Please try again.';
                errorBox.style.display = 'block';
                submitBtn.disabled = false;
                submitBtn.innerHTML = '&#128274;&nbsp;&nbsp;Reset Password';
            };
            xhr.send(JSON.stringify({ token: token, newPassword: newPassword }));

            return false;
        }
    </script>
</body>
</html>
