replicaCount: 1

# Environment configuration (overridden by pipeline)
environment:
  name: "dev"       # Pipeline sets: dev or prod
  suffix: "-dev"    # Pipeline sets: "-dev" or ""

image:
  repository: ghcr.io/tomassirio/wanderer-auth
  pullPolicy: IfNotPresent
  tag: "latest"

service:
  type: ClusterIP
  port: 8083       # Service port (same for dev and prod)
  targetPort: 8083 # Container port

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi
# Application configuration
application:
  serverPort: 8083
  projectVersion: "0.3.7"
  
  # CORS Configuration (overridden by pipeline based on environment)
  cors:
    allowedOrigins: "http://localhost:3000"

  # JWT Configuration
  jwt:
    secret: "0123456789ABCDEF0123456789ABCDEF"
    expirationMs: 900000
  
  # Database Configuration
  database:
    url: "jdbc:postgresql://postgres:5432/wanderer_auth_db"
    username: "wanderer_auth"
    password: "password"
    driverClassName: "org.postgresql.Driver"
  
  # Liquibase
  liquibase:
    enabled: true
    changeLog: "classpath:db/changelog/db.changelog-master.yaml"
  
  # JPA/Hibernate
  jpa:
    hibernateDdlAuto: "none"
  
  # Wanderer service URLs (will be set by helm deploy with environment suffix)
  wandererCommandUrl: "http://wanderer-command:8081"
  wandererQueryUrl: "http://wanderer-query:8082"

  # Rate Limiting (lower limit for auth service to prevent brute-force)
  rateLimit:
    enabled: true
    maxRequests: 20
    windowSeconds: 60

  # Spring Cloud
  springCloud:
    compatibilityVerifierEnabled: false

  # Bootstrap Admin Configuration
  # Set via GitHub environment variables per environment
  bootstrap:
    adminUsername: ""
    adminEnabled: true

  # Email Configuration (Brevo SMTP)
  # PASSWORD is a secret - set via GitHub Actions secrets
  email:
    enabled: false
    host: "smtp-relay.brevo.com"
    port: 587
    username: "a39a49001@smtp-brevo.com"
    password: ""  # Set via GitHub secret EMAIL_PASSWORD
    from: "wanderer@tomassir.io"
    fromName: "Wanderer"
    baseUrl: "http://localhost:3000"
    auth: true
    startTls: true

# Pod Storage
volumeClaimTemplates:
  enabled: false
  storage: 1Gi
  storageClassName: standard
