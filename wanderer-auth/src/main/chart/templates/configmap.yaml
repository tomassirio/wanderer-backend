apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Chart.Name }}{{ .Values.environment.suffix }}-config
  labels:
    app: {{ .Chart.Name }}{{ .Values.environment.suffix }}
data:
  application.properties: |
    server.port={{ .Values.application.serverPort }}

    # Application version from Maven
    project.version={{ .Values.application.projectVersion }}

    # CORS Configuration
    app.cors.allowed-origins={{ .Values.application.cors.allowedOrigins }}

    # JWT secret - override in production via env var or external config
    jwt.secret={{ .Values.application.jwt.secret }}
    jwt.expiration-ms={{ .Values.application.jwt.expirationMs }}

    # PostgreSQL Database Connection
    # TODO: Change back to spring.datasource.* after rebuilding Docker images with updated code
    db.url={{ .Values.application.database.url }}
    db.username={{ .Values.application.database.username }}
    db.password={{ .Values.application.database.password }}
    db.driver-class-name={{ .Values.application.database.driverClassName }}

    # Let Liquibase run migrations against the auth DB
    spring.liquibase.enabled={{ .Values.application.liquibase.enabled }}
    spring.liquibase.change-log={{ .Values.application.liquibase.changeLog }}

    # In development we can allow Hibernate to update; in production prefer validated migrations
    spring.jpa.hibernate.ddl-auto={{ .Values.application.jpa.hibernateDdlAuto }}

    # Wanderer service URLs
    wanderer.command.url={{ .Values.application.wandererCommandUrl }}
    wanderer.query.url={{ .Values.application.wandererQueryUrl }}

    # Redis Configuration
    spring.data.redis.host={{ .Values.application.redis.host }}
    spring.data.redis.port={{ .Values.application.redis.port }}

    # JTI Blacklist Validation
    app.security.jti-validation.enabled={{ .Values.application.security.jtiValidation.enabled }}

    # Disable Spring Cloud compatibility verifier
    spring.cloud.compatibility-verifier.enabled={{ .Values.application.springCloud.compatibilityVerifierEnabled }}

    # Rate Limiting
    app.rate-limit.enabled={{ .Values.application.rateLimit.enabled }}
    app.rate-limit.max-requests={{ .Values.application.rateLimit.maxRequests }}
    app.rate-limit.window-seconds={{ .Values.application.rateLimit.windowSeconds }}

    # Bootstrap Admin Configuration
    bootstrap.admin.username={{ .Values.application.bootstrap.adminUsername }}
    bootstrap.admin.enabled={{ .Values.application.bootstrap.adminEnabled }}

    # Email Configuration (Brevo SMTP)
    app.email.enabled={{ .Values.application.email.enabled }}
    app.email.host={{ .Values.application.email.host }}
    app.email.port={{ .Values.application.email.port }}
    app.email.username={{ .Values.application.email.username }}
    app.email.password={{ .Values.application.email.password }}
    app.email.from={{ .Values.application.email.from }}
    app.email.from-name={{ .Values.application.email.fromName }}
    app.email.base-url={{ .Values.application.email.baseUrl }}
    app.email.auth={{ .Values.application.email.auth }}
    app.email.start-tls={{ .Values.application.email.startTls }}

    # Management endpoints for Prometheus metrics
    management.endpoints.web.base-path=/actuator
    management.endpoints.web.exposure.include=health,info,prometheus
    management.endpoint.health.show-details=always
    management.metrics.export.prometheus.enabled=true

