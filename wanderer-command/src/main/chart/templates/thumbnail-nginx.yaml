{{- if and .Values.thumbnail.enabled .Values.thumbnail.nginx.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Chart.Name }}{{ .Values.environment.suffix }}-nginx-config
  labels:
    app: {{ .Chart.Name }}{{ .Values.environment.suffix }}-nginx
data:
  default.conf: |
    server {
        listen 80;
        server_name _;
        
        location /thumbnails/ {
            alias /usr/share/nginx/html/thumbnails/;
            expires 30d;
            add_header Cache-Control "public, immutable";
            
            # Enable CORS for frontend
            add_header Access-Control-Allow-Origin *;
            
            # Security headers
            add_header X-Content-Type-Options "nosniff";
            add_header X-Frame-Options "SAMEORIGIN";
        }
        
        # Health check endpoint
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Chart.Name }}{{ .Values.environment.suffix }}-nginx
  labels:
    app: {{ .Chart.Name }}{{ .Values.environment.suffix }}-nginx
spec:
  replicas: {{ .Values.thumbnail.nginx.replicas }}
  selector:
    matchLabels:
      app: {{ .Chart.Name }}{{ .Values.environment.suffix }}-nginx
  template:
    metadata:
      labels:
        app: {{ .Chart.Name }}{{ .Values.environment.suffix }}-nginx
    spec:
      containers:
      - name: nginx
        image: "{{ .Values.thumbnail.nginx.image.repository }}:{{ .Values.thumbnail.nginx.image.tag }}"
        imagePullPolicy: {{ .Values.thumbnail.nginx.image.pullPolicy }}
        ports:
        - containerPort: 80
          name: http
          protocol: TCP
        volumeMounts:
        - name: thumbnails
          mountPath: /usr/share/nginx/html/thumbnails
          readOnly: true
        - name: nginx-config
          mountPath: /etc/nginx/conf.d
        resources:
          {{- toYaml .Values.thumbnail.nginx.resources | nindent 10 }}
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
      volumes:
      - name: thumbnails
        persistentVolumeClaim:
          claimName: {{ .Chart.Name }}{{ .Values.environment.suffix }}-thumbnails-pvc
      - name: nginx-config
        configMap:
          name: {{ .Chart.Name }}{{ .Values.environment.suffix }}-nginx-config
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Chart.Name }}{{ .Values.environment.suffix }}-nginx
  labels:
    app: {{ .Chart.Name }}{{ .Values.environment.suffix }}-nginx
spec:
  type: {{ .Values.thumbnail.nginx.service.type }}
  selector:
    app: {{ .Chart.Name }}{{ .Values.environment.suffix }}-nginx
  ports:
  - port: {{ .Values.thumbnail.nginx.service.port }}
    targetPort: http
    protocol: TCP
    name: http
{{- end }}
