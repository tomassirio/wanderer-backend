replicaCount: 1

# Environment configuration (overridden by pipeline)
environment:
  name: "dev"       # Pipeline sets: dev or prod
  suffix: "-dev"    # Pipeline sets: "-dev" or ""

image:
  repository: ghcr.io/tomassirio/wanderer-command
  pullPolicy: IfNotPresent
  tag: "latest"

service:
  type: ClusterIP
  port: 8081       # Service port (same for dev and prod)
  targetPort: 8081 # Container port

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

# Application configuration
application:
  name: "wanderer-command"
  serverPort: 8081
  projectVersion: "0.3.7"
  
  # CORS Configuration (overridden by pipeline based on environment)
  cors:
    allowedOrigins: "http://localhost:3000"

  # JWT Configuration
  jwt:
    secret: "0123456789ABCDEF0123456789ABCDEF"
  
  # Logging
  logging:
    level:
      command: INFO
      root: WARN
  
  # Management endpoints
  management:
    endpoints:
      web:
        basePath: "/actuator"
        exposure:
          include: "health,info"
    endpoint:
      health:
        showDetails: "always"
  
  # Database Configuration
  database:
    url: "jdbc:postgresql://postgres-dev:5432/wanderer_db"
    username: "wanderer"
    password: "password"
    driverClassName: "org.postgresql.Driver"
  
  # JPA/Hibernate
  jpa:
    hibernateDdlAuto: "validate"
  
  # Liquibase
  liquibase:
    changeLog: "classpath:db/changelog/db.changelog-master.yaml"

  # Google Maps Configuration
  googleMaps:
    apiKey: ""
    enabled: true

  # Thumbnail Configuration
  thumbnail:
    storagePath: "/data/thumbnails"
    baseUrl: "https://wanderer.yourdomain.com/thumbnails"
    width: 600
    height: 338
    enabled: true

  # Wanderer service URLs
  wanderer:
    authUrl: "http://wanderer-auth:8083"

  # Rate Limiting
  rateLimit:
    enabled: true
    maxRequests: 100
    windowSeconds: 60

  # Spring Cloud Configuration
  springCloud:
    compatibilityVerifierEnabled: false

# Thumbnail Storage Configuration
thumbnail:
  enabled: true
  storage:
    # Use existing PVC created by centralized storage (set to true for K3s cluster deployments)
    useExistingClaim: false
    # PersistentVolumeClaim configuration
    size: 20Gi
    storageClassName: ""  # Use default storage class if empty
    accessModes:
      - ReadWriteMany
    # hostPath configuration (for K3s single-node when useExistingClaim=false)
    hostPath: "/mnt/data/wanderer-thumbnails"
  
  # Nginx static file server configuration
  nginx:
    enabled: true
    replicas: 2
    image:
      repository: nginx
      tag: alpine
      pullPolicy: IfNotPresent
    resources:
      limits:
        cpu: 100m
        memory: 128Mi
      requests:
        cpu: 50m
        memory: 64Mi
    service:
      type: ClusterIP
      port: 80
  
  # Ingress configuration for thumbnails
  # Note: If you have a main ingress, add the /thumbnails path there instead
  ingress:
    enabled: false  # Set to true if you want a separate ingress for thumbnails
    host: "wanderer.yourdomain.com"
    annotations: {}
      # nginx.ingress.kubernetes.io/rewrite-target: /
    tls:
      enabled: true
      secretName: "wanderer-tls"
    certManager:
      enabled: true
      issuer: "letsencrypt-prod"

# Pod Storage
volumeClaimTemplates:
  enabled: false
  storage: 1Gi
  storageClassName: standard
