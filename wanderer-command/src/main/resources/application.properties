# Wanderer Command Application Configuration
spring.application.name=wanderer-command
server.port=8081

# Application version from Maven
project.version=@project.version@

# CORS Configuration - comma-separated list of allowed origins
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:51538,http://localhost:3000,https://wanderer.localwanderer-dev.com}

jwt.secret=0123456789ABCDEF0123456789ABCDEF

# Google Maps & Weather API Configuration (same API key, enable Weather API in GCP console)
google.maps.api-key=${GOOGLE_MAPS_API_KEY:}
google.maps.enabled=${GOOGLE_MAPS_ENABLED:true}
google.weather.enabled=${GOOGLE_WEATHER_ENABLED:true}

# Thumbnail Storage Configuration
thumbnail.storage-path=${THUMBNAIL_STORAGE_PATH:/data/thumbnails}
# Note: Backend returns relative URLs (/thumbnails/*), frontend resolves with correct protocol
thumbnail.width=${THUMBNAIL_WIDTH:600}
thumbnail.height=${THUMBNAIL_HEIGHT:338}
thumbnail.enabled=${THUMBNAIL_ENABLED:true}

# Logging
logging.level.com.tomassirio.wanderer.command=INFO
logging.level.root=WARN

# Management endpoints
management.endpoints.web.base-path=/actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# PostgreSQL Database Connection
db.url=jdbc:postgresql://localhost:5432/wanderer_db
db.username=wanderer
db.password=password
db.driver-class-name=org.postgresql.Driver

# JPA and Hibernate
spring.jpa.hibernate.ddl-auto=validate

# Liquibase
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml

# Wanderer service URLs
wanderer.auth.url=${WANDERER_AUTH_URL:http://localhost:8083}

# Rate Limiting
app.rate-limit.enabled=${RATE_LIMIT_ENABLED:true}
app.rate-limit.max-requests=${RATE_LIMIT_MAX_REQUESTS:100}
app.rate-limit.window-seconds=${RATE_LIMIT_WINDOW_SECONDS:60}

# Disable Spring Cloud compatibility verifier
spring.cloud.compatibility-verifier.enabled=false

