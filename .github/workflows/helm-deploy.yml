name: Helm Deploy to Kubernetes

on:
  workflow_call:
    inputs:
      environment:
        description: 'Deployment environment (dev, staging, production)'
        required: true
        type: string
      image-tag:
        description: 'Docker image tag to deploy'
        required: true
        type: string
      namespace:
        description: 'Kubernetes namespace'
        required: false
        type: string
      service:
        description: 'Service to deploy (empty for all)'
        required: false
        type: string
        default: ''
    secrets:
      TWINGATE_SERVICE_KEY:
        description: 'Twingate service key for cluster access'
        required: true
      KUBECONFIG_CONTENT:
        description: 'Base64 encoded kubeconfig file'
        required: true
      DB_PASSWORD:
        description: 'Password for wanderer database user'
        required: true
      DB_AUTH_PASSWORD:
        description: 'Password for wanderer_auth database user'
        required: true
      POSTGRES_PASSWORD:
        description: 'PostgreSQL superuser password'
        required: true
      JWT_SECRET:
        description: 'JWT signing secret'
        required: true
      GOOGLE_MAPS_API_KEY:
        description: 'Google Maps API key for distance calculation'
        required: false
      EMAIL_PASSWORD:
        description: 'SMTP password for Brevo email service'
        required: false

env:
  ENV_SUFFIX: ${{ inputs.environment == 'dev' && '-dev' || '' }}

jobs:
  deploy-postgres:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Connect to Twingate
        uses: twingate/github-action@v1
        with:
          service-key: ${{ secrets.TWINGATE_SERVICE_KEY }}

      - name: Setup Kubernetes
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_CONTENT }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Deploy PostgreSQL
        env:
          PVC_NAME: postgres${{ env.ENV_SUFFIX }}-pvc
          STATEFULSET_NAME: postgres${{ env.ENV_SUFFIX }}
        run: |
          # Handle PVC change if StatefulSet exists
          if kubectl get statefulset $STATEFULSET_NAME -n ${{ inputs.namespace }} &>/dev/null; then
            CURRENT_PVC=$(kubectl get statefulset $STATEFULSET_NAME -n ${{ inputs.namespace }} -o jsonpath='{.spec.template.spec.volumes[?(@.name=="postgres-storage")].persistentVolumeClaim.claimName}')
            if [ "$CURRENT_PVC" != "$PVC_NAME" ]; then
              echo "PVC changed, recreating StatefulSet..."
              kubectl delete statefulset $STATEFULSET_NAME -n ${{ inputs.namespace }} --cascade=orphan
              kubectl delete pod ${STATEFULSET_NAME}-0 -n ${{ inputs.namespace }} --force --grace-period=0 || true
            fi
          fi
          
          helm upgrade --install postgres ./commons/src/main/chart \
            --namespace ${{ inputs.namespace }} \
            --create-namespace \
            --set environment.name="${{ inputs.environment }}" \
            --set environment.suffix="${{ env.ENV_SUFFIX }}" \
            --set postgres.password="${{ secrets.POSTGRES_PASSWORD }}" \
            --set postgres.userPassword="${{ secrets.DB_PASSWORD }}" \
            --set postgres.authPassword="${{ secrets.DB_AUTH_PASSWORD }}" \
            --set persistence.existingClaim="$PVC_NAME" \
            --wait --timeout 5m
          
          echo "✓ PostgreSQL deployed successfully"

  deploy-services:
    needs: deploy-postgres
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    strategy:
      matrix:
        service: [wanderer-auth, wanderer-command, wanderer-query]
        include:
          - service: wanderer-auth
            port: 8083
            db: wanderer_auth_db
          - service: wanderer-command
            port: 8081
            db: wanderer_db
          - service: wanderer-query
            port: 8082
            db: wanderer_db
      fail-fast: false

    steps:
      - name: Check if service should be deployed
        id: should-deploy
        run: |
          if [ -z "${{ inputs.service }}" ] || [ "${{ inputs.service }}" == "${{ matrix.service }}" ]; then
            echo "deploy=true" >> $GITHUB_OUTPUT
          else
            echo "deploy=false" >> $GITHUB_OUTPUT
          fi

      - name: Checkout code
        if: steps.should-deploy.outputs.deploy == 'true'
        uses: actions/checkout@v4

      - name: Connect to Twingate
        if: steps.should-deploy.outputs.deploy == 'true'
        uses: twingate/github-action@v1
        with:
          service-key: ${{ secrets.TWINGATE_SERVICE_KEY }}

      - name: Setup Kubernetes
        if: steps.should-deploy.outputs.deploy == 'true'
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_CONTENT }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Update Chart.yaml version
        if: steps.should-deploy.outputs.deploy == 'true'
        run: |
          if [ "${{ inputs.environment }}" == "dev" ] || [ "${{ inputs.image-tag }}" == "latest" ]; then
            VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
            # Remove -SNAPSHOT suffix if present
            VERSION="${VERSION%-SNAPSHOT}"
          else
            # Strip 'v' prefix if present
            VERSION="${{ inputs.image-tag }}"
            VERSION="${VERSION#v}"
          fi
          
          CHART_FILE="./${{ matrix.service }}/src/main/chart/Chart.yaml"
          if [ -f "$CHART_FILE" ]; then
            sed -i "s/^version: .*/version: $VERSION/" "$CHART_FILE"
            sed -i "s/^appVersion: .*/appVersion: \"$VERSION\"/" "$CHART_FILE"
          fi

      - name: Deploy ${{ matrix.service }}
        if: steps.should-deploy.outputs.deploy == 'true'
        env:
          DB_PASSWORD: ${{ matrix.service == 'wanderer-auth' && secrets.DB_AUTH_PASSWORD || secrets.DB_PASSWORD }}
          DB_URL: jdbc:postgresql://postgres${{ env.ENV_SUFFIX }}:5432/${{ matrix.db }}
          EMAIL_SMTP_PWD: ${{ secrets.EMAIL_PASSWORD }}
        run: |
          # Environment-specific CORS configuration
          if [ "${{ inputs.environment }}" == "dev" ]; then
            # Dev: Allow localhost, local domain, and public URL if set
            CORS_ORIGINS="http://localhost:51538,http://localhost:3000,https://wanderer.localwanderer-dev.com,http://wanderer.localwanderer-dev.com"
            if [ -n "${{ vars.PUBLIC_URL }}" ]; then
              CORS_ORIGINS="${{ vars.PUBLIC_URL }},$CORS_ORIGINS"
            fi
          else
            # Prod: Only public URL
            CORS_ORIGINS="${{ vars.PUBLIC_URL }}"
          fi
          # Escape commas for Helm --set
          CORS_ORIGINS_ESCAPED="${CORS_ORIGINS//,/\\,}"
          
          # Environment-specific configuration
          if [ "${{ inputs.environment }}" == "dev" ]; then
            REPLICA_COUNT="1"
            CPU_LIMIT="500m"
            MEMORY_LIMIT="512Mi"
            CPU_REQUEST="250m"
            MEMORY_REQUEST="256Mi"
            LOG_LEVEL_APP="DEBUG"
            LOG_LEVEL_ROOT="INFO"
          else
            REPLICA_COUNT="3"
            CPU_LIMIT="1000m"
            MEMORY_LIMIT="1Gi"
            CPU_REQUEST="500m"
            MEMORY_REQUEST="512Mi"
            LOG_LEVEL_APP="INFO"
            LOG_LEVEL_ROOT="WARN"
          fi
          
          HELM_ARGS=(
            "upgrade" "--install" "${{ matrix.service }}" "./${{ matrix.service }}/src/main/chart"
            "--namespace" "${{ inputs.namespace }}"
            "--set" "environment.name=${{ inputs.environment }}"
            "--set" "environment.suffix=${{ env.ENV_SUFFIX }}"
            "--set" "replicaCount=$REPLICA_COUNT"
            "--set" "service.port=${{ matrix.port }}"
            "--set" "image.tag=${{ inputs.image-tag }}"
            "--set" "image.pullPolicy=${{ inputs.environment == 'dev' && 'Always' || 'IfNotPresent' }}"
            "--set" "resources.limits.cpu=$CPU_LIMIT"
            "--set" "resources.limits.memory=$MEMORY_LIMIT"
            "--set" "resources.requests.cpu=$CPU_REQUEST"
            "--set" "resources.requests.memory=$MEMORY_REQUEST"
            "--set" "application.logging.level.root=$LOG_LEVEL_ROOT"
            "--set" "application.jwt.secret=${{ secrets.JWT_SECRET }}"
            "--set" "application.database.password=$DB_PASSWORD"
            "--set" "application.database.url=$DB_URL"
            "--set" "application.cors.allowedOrigins=$CORS_ORIGINS_ESCAPED"
            "--set" "ingress.enabled=false"
          )
          
          # Set service-specific logging level
          if [ "${{ matrix.service }}" == "wanderer-command" ]; then
            HELM_ARGS+=(
              "--set" "application.logging.level.command=$LOG_LEVEL_APP"
            )
          elif [ "${{ matrix.service }}" == "wanderer-query" ]; then
            HELM_ARGS+=(
              "--set" "application.logging.level.query=$LOG_LEVEL_APP"
            )
          elif [ "${{ matrix.service }}" == "wanderer-auth" ]; then
            HELM_ARGS+=(
              "--set" "application.logging.level.auth=$LOG_LEVEL_APP"
            )
          fi
          
          if [ "${{ matrix.service }}" == "wanderer-auth" ]; then
            HELM_ARGS+=(
              "--set" "application.wandererCommandUrl=http://wanderer-command${{ env.ENV_SUFFIX }}:8081"
              "--set" "application.wandererQueryUrl=http://wanderer-query${{ env.ENV_SUFFIX }}:8082"
            )
            # Bootstrap admin configuration from GitHub environment variables
            if [ -n "${{ vars.BOOTSTRAP_ADMIN_USERNAME }}" ]; then
              HELM_ARGS+=(
                "--set" "application.bootstrap.adminUsername=${{ vars.BOOTSTRAP_ADMIN_USERNAME }}"
              )
            fi
            if [ -n "${{ vars.BOOTSTRAP_ADMIN_ENABLED }}" ]; then
              HELM_ARGS+=(
                "--set" "application.bootstrap.adminEnabled=${{ vars.BOOTSTRAP_ADMIN_ENABLED }}"
              )
            fi
            # Email configuration from GitHub environment variables and secrets
            if [ -n "${{ vars.EMAIL_ENABLED }}" ]; then
              HELM_ARGS+=(
                "--set" "application.email.enabled=${{ vars.EMAIL_ENABLED }}"
              )
            fi
            HELM_ARGS+=(
              "--set-string" "application.email.password=$EMAIL_SMTP_PWD"
            )
            if [ -n "${{ vars.EMAIL_BASE_URL }}" ]; then
              HELM_ARGS+=(
                "--set" "application.email.baseUrl=${{ vars.EMAIL_BASE_URL }}"
              )
            fi
          fi
          
          if [ "${{ matrix.service }}" == "wanderer-command" ] && [ -n "${{ secrets.GOOGLE_MAPS_API_KEY }}" ]; then
            HELM_ARGS+=(
              "--set" "application.googleMaps.apiKey=${{ secrets.GOOGLE_MAPS_API_KEY }}"
            )
            
            # Thumbnail configuration
            # Uses PUBLIC_URL environment variable (set per environment in GitHub)
            # Dev: http://wanderer.localwanderer-dev.com
            # Prod: https://wanderer.tomassir.io
            THUMBNAIL_BASE_URL="${{ vars.PUBLIC_URL }}/thumbnails"
            
            if [ "${{ inputs.environment }}" == "dev" ]; then
              THUMBNAIL_STORAGE_SIZE="5Gi"
              THUMBNAIL_NGINX_REPLICAS="1"
            else
              THUMBNAIL_STORAGE_SIZE="20Gi"
              THUMBNAIL_NGINX_REPLICAS="2"
            fi
            
            HELM_ARGS+=(
              "--set" "application.thumbnail.baseUrl=$THUMBNAIL_BASE_URL"
              "--set" "application.thumbnail.enabled=true"
              "--set" "thumbnail.enabled=true"
              "--set" "thumbnail.storage.useExistingClaim=true"
              "--set" "thumbnail.storage.size=$THUMBNAIL_STORAGE_SIZE"
              "--set" "thumbnail.nginx.replicas=$THUMBNAIL_NGINX_REPLICAS"
            )
          fi

          if [ "${{ matrix.service }}" == "wanderer-command" ] || [ "${{ matrix.service }}" == "wanderer-query" ]; then
            HELM_ARGS+=(
              "--set" "application.wanderer.authUrl=http://wanderer-auth${{ env.ENV_SUFFIX }}:8083"
            )
          fi
          
          # Debug: check if EMAIL_PASSWORD secret has a value (logs length only, not the value)
          if [ "${{ matrix.service }}" == "wanderer-auth" ]; then
            EMAIL_PWD_LENGTH=${#EMAIL_SMTP_PWD}
            echo "EMAIL_PASSWORD length: $EMAIL_PWD_LENGTH"
            if [ "$EMAIL_PWD_LENGTH" -eq 0 ]; then
              echo "::warning::EMAIL_PASSWORD secret is empty — email authentication will fail"
            fi
          fi
          
          helm "${HELM_ARGS[@]}" --wait --timeout 5m
          echo "✓ ${{ matrix.service }} deployed successfully"

      - name: Check pod health
        if: steps.should-deploy.outputs.deploy == 'true'
        run: |
          kubectl wait --for=condition=ready pod -l app=${{ matrix.service }}${{ env.ENV_SUFFIX }} \
            -n ${{ inputs.namespace }} --timeout=120s || true

      - name: Display pod logs on failure
        if: failure() && steps.should-deploy.outputs.deploy == 'true'
        run: kubectl logs -l app=${{ matrix.service }}${{ env.ENV_SUFFIX }} -n ${{ inputs.namespace }} --tail=50 || true

  verify-deployment:
    needs: deploy-services
    runs-on: ubuntu-latest

    steps:
      - name: Connect to Twingate
        uses: twingate/github-action@v1
        with:
          service-key: ${{ secrets.TWINGATE_SERVICE_KEY }}

      - name: Setup Kubernetes
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_CONTENT }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Verify deployment
        run: |
          echo "=== Deployments ==="
          kubectl get deployments,statefulsets -n ${{ inputs.namespace }}
          echo -e "\n=== Pods ==="
          kubectl get pods -n ${{ inputs.namespace }}
          echo -e "\n=== Services ==="
          kubectl get services -n ${{ inputs.namespace }}


