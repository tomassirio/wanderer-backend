# Wanderer Query Application Configuration
spring.application.name=wanderer-query
server.port=8082

project.version=@project.version@

# CORS Configuration - comma-separated list of allowed origins
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:51538,http://localhost:3000,https://wanderer.localwanderer-dev.com}

jwt.secret=0123456789ABCDEF0123456789ABCDEF

# Logging
logging.level.com.tomassirio.wanderer.command=INFO
logging.level.root=WARN

# Management endpoints for Prometheus metrics
management.endpoints.web.base-path=/actuator
management.endpoints.web.exposure.include=health,info,prometheus,metrics,caches
management.endpoint.health.show-details=always
management.metrics.export.prometheus.enabled=true
management.metrics.enable.cache=true
management.metrics.cache.instrument-cache=true
management.metrics.redis.enabled=true

# PostgreSQL Database Connection
db.url=jdbc:postgresql://localhost:5432/wanderer_db
db.username=wanderer
db.password=password
db.driver-class-name=org.postgresql.Driver

# JPA and Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.generate_statistics=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Liquibase
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml

# Wanderer service URLs
wanderer.auth.url=${WANDERER_AUTH_URL:http://localhost:8083}

# Rate Limiting
app.rate-limit.enabled=${RATE_LIMIT_ENABLED:true}
app.rate-limit.max-requests=${RATE_LIMIT_MAX_REQUESTS:100}
app.rate-limit.window-seconds=${RATE_LIMIT_WINDOW_SECONDS:60}

# Disable Spring Cloud compatibility verifier
spring.cloud.compatibility-verifier.enabled=false

# Redis Configuration
spring.cache.type=redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=60000

# Cache TTL Configuration (in seconds)
cache.default.ttl-seconds=${CACHE_DEFAULT_TTL:300}
cache.users.ttl-seconds=${CACHE_USERS_TTL:600}
cache.trips.ttl-seconds=${CACHE_TRIPS_TTL:300}
cache.trip-updates.ttl-seconds=${CACHE_TRIP_UPDATES_TTL:30}
cache.promoted-trips.ttl-seconds=${CACHE_PROMOTED_TRIPS_TTL:600}
cache.achievements.ttl-seconds=${CACHE_ACHIEVEMENTS_TTL:3600}
cache.friendships.ttl-seconds=${CACHE_FRIENDSHIPS_TTL:600}
cache.notifications-count.ttl-seconds=${CACHE_NOTIFICATIONS_COUNT_TTL:60}

